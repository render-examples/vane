# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

previews:
  generation: off

services:
  - type: web
    name: vane
    runtime: docker
    plan: standard
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "10000"
      - key: VANE_INTERNAL_PORT
        value: "3000"
      - key: SEARXNG_API_URL
        value: http://localhost:8080
      - key: BASIC_AUTH_USERNAME
        value: vane
      - key: BASIC_AUTH_PASSWORD
        generateValue: true
    disk:
      name: vane-data
      mountPath: /home/vane/data
      sizeGB: 5
